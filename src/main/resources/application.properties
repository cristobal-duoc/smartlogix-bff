# Puerto del BFF — detras del API Gateway (que escucha en el 8080, entrada unica).
# El frontend entra por el Gateway; el Gateway reenvia a este BFF en el 8088.
server.port=8088

# URLs base de los microservicios internos
# El BFF se comunica con estos endpoints para agregar datos
inventario.url=http://localhost:8081
pedidos.url=http://localhost:8082

# Nombre de la aplicación
spring.application.name=bff

# --- Configuración del Circuit Breaker (Resilience4j) ---
# slidingWindowSize: número de llamadas que Resilience4j analiza para calcular la tasa de fallos
resilience4j.circuitbreaker.instances.inventario.slidingWindowSize=5

# failureRateThreshold: si el 50% o más de las llamadas fallan, el circuito se ABRE
resilience4j.circuitbreaker.instances.inventario.failureRateThreshold=50

# waitDurationInOpenState: tiempo que el circuito permanece ABIERTO antes de intentar de nuevo
resilience4j.circuitbreaker.instances.inventario.waitDurationInOpenState=10s

# permittedNumberOfCallsInHalfOpenState: llamadas de prueba cuando el circuito está SEMI-ABIERTO
resilience4j.circuitbreaker.instances.inventario.permittedNumberOfCallsInHalfOpenState=3

# Exponer el estado del Circuit Breaker en el endpoint de salud
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
